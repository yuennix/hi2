kind = "web"
previewPath = "/"
title = "Hi2 Temp Mail"
version = "1.0.0"
id = "artifacts/hi2-mail"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19095

[services.development]
run = "pnpm --filter @workspace/hi2-mail run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hi2-mail", "run", "build" ]
publicDir = "artifacts/hi2-mail/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19095"
BASE_PATH = "/"
